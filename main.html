<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - AM 4:00の境界線</title>
    <style>
        /* --- スクロールバー設定 --- */
        html {
            scroll-behavior: smooth;
            overflow-y: scroll; /* 常にスクロール領域を確保 */
            scrollbar-gutter: stable; /* バーが出てもガタつかない */
        }

        /* バー自体のデザインを闇に馴染ませる */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb {
            background: #2c313c;
            border-radius: 10px;
            border: 2px solid #0b0e14;
        }

        /* --- 基本デザイン --- */
        body {
            background-color: #0b0e14;
            color: #d1d1d1;
            font-family: "MS P明朝", "Yu Mincho", serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            letter-spacing: 0.1em;
        }

        /* --- サイドナビ（PC固定） --- */
        nav {
            width: 220px;
            border-right: 1px solid #2c313c;
            padding: 50px 25px;
            position: fixed;
            height: 100vh;
            background-color: rgba(11, 14, 20, 0.95);
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 100;
        }

        /* JSで挿入されるメニューのスタイル */
        nav h2 { font-size: 0.85rem; color: #88aaff; letter-spacing: 0.3em; margin-bottom: 40px; font-weight: normal; }
        .menu-group { margin-bottom: 40px; }
        .menu-title { display: block; font-size: 0.75rem; color: #555; margin-bottom: 15px; border-bottom: 1px solid #222; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin-bottom: 12px; }
        nav a { color: #999; text-decoration: none; font-size: 0.85rem; transition: 0.4s; display: block; }
        nav a:hover { color: #fff; padding-left: 8px; text-shadow: 0 0 10px rgba(136, 170, 255, 0.5); }
        .current-page { color: #ececec !important; pointer-events: none; border-left: 1px solid #88aaff; padding-left: 5px; }

        /* サブメニュー用 */
        .sub-menu { list-style: none; padding: 10px 0 0 15px !important; margin: 0; }
        .sub-menu a { font-size: 0.75rem !important; color: #666 !important; }

        /* --- メインエリア --- */
        main {
            margin-left: 220px;
            padding: 80px 60px;
            flex-grow: 1;
            max-width: 750px;
            box-sizing: border-box;
        }

        h3 {
            font-weight: normal;
            font-size: 1.2rem;
            color: #ececec;
            margin-bottom: 40px;
            padding-left: 10px;
            border-left: 2px solid #88aaff;
        }

        .status-box {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 60px;
            line-height: 1.8;
            padding: 20px;
            background-color: rgba(255,255,255,0.02);
            border: 1px solid #1a1e26;
        }

        .content-section {
            margin-bottom: 80px;
            line-height: 1.9;
        }

        .date {
            color: #88aaff;
            font-size: 0.85rem;
            margin-right: 15px;
        }

    </style>
</head>
<body>

    <nav></nav>

    <main>
        <div class="status-box" id="counter-display">
            You are the 000001st traveler.
        </div>

        <section class="content-section">
            <h3>Update Log</h3>
            <p><span class="date">2026.04.22</span> Monologue 更新</p>
            <p><span class="date">2026.04.19</span> Column 公開</p>
            <p><span class="date">2026.04.05</span> カウンターをこっそり実装</p>
            <p><span class="date">2026.04.04</span> サイト開設</p>
        </section>
    </main>

    <script>
        // カウンターの処理
        document.addEventListener("DOMContentLoaded", function() {
            const counterElement = document.getElementById('counter-display');
            if (counterElement) {
                const startDate = new Date('2026-04-04T04:00:00').getTime();
                const now = new Date().getTime();
                const secondsPassed = Math.floor((now - startDate) / 1000);
                let baseCount = Math.floor(secondsPassed / 21600); 
                let flicker = (now % 10 == 0) ? 1 : 0; 
                let initialValue = 2; 
                let finalCount = initialValue + baseCount + flicker;
                const formattedCount = String(finalCount).padStart(6, '0');
                counterElement.innerHTML = `You are the ${formattedCount}st traveler.`;
            }
        });
    </script>

    <script src="menu.js"></script>

</body>
</html>
