<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM 4:00の境界線</title>
    <style>
        /* 【デザインのポイント】
           ・背景は真っ黒ではなく、夜明け前の空のような深い紺色。
           ・文字の間隔を広めにとり、静謐な空気感を演出。
           ・明朝体を使うことで、文学的で繊細な印象に。
        */
        body {
            background-color: #0b0e14; 
            color: #d1d1d1;
            text-align: center;
            padding-top: 15vh; 
            font-family: "MS P明朝", "Yu Mincho", "Sawarabi Mincho", serif;
            line-height: 2;
            letter-spacing: 0.15em;
            margin: 0;
        }

        /* サイトタイトル：境界線の向こう側のような淡い白 */
        h1 {
            font-weight: normal;
            font-size: 1.8rem;
            margin-bottom: 50px;
            color: #ececec;
            filter: blur(0.5px); /* ほんの少しだけぼかして幻想的に */
        }

        /* 導入文 */
        .intro-text {
            font-size: 1rem;
            margin-bottom: 40px;
        }

        /* 警告文：かつてのメンヘラサイトの様式美 */
        .caution-box {
            max-width: 550px;
            margin: 40px auto;
            padding: 25px;
            border: 1px solid #2c313c; 
            font-size: 0.85rem;
            color: #888;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .caution-title {
            color: #aa4444; /* 警告らしい、くすんだ赤 */
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.5em;
        }

        /* ENTERボタン：夜明けの光のような青い発光 */
        a {
            color: #88aaff;
            text-decoration: none;
            border: 1px solid #88aaff;
            padding: 12px 50px;
            display: inline-block;
            margin-top: 40px;
            transition: 0.8s ease; /* ゆっくりと反応させる */
            font-size: 0.9rem;
        }

        a:hover {
            background-color: rgba(136, 170, 255, 0.05);
            box-shadow: 0 0 20px rgba(136, 170, 255, 0.3); 
            color: #fff;
            letter-spacing: 0.3em; /* ホバーで少し広がる演出 */
        }

        /* 管理人名：月樹 */
        .admin-name {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 0.4em;
        }

        /* フッター：著作権表記 */
        footer {
            margin-top: 120px;
            padding-bottom: 50px;
            font-size: 0.7rem;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>AM 4:00の境界線</h1>
    
    <div class="intro-text">
        ようこそ、薄明りの世界へ。<br>
        ここからは、私が案内します。
    </div>

    <div class="caution-box">
        <span class="caution-title">CAUTION</span>
        <p>
            当サイトには、自傷行為やオーバードーズ等に関する<br>
            個人的な独白が含まれます。<br>
            閲覧による体調不良等については責任を負いかねます。<br>
            また、決して模倣はなさらないようお願いいたします。
        </p>
        <p style="font-size: 0.75rem; margin-top: 20px;">※掲載内容はすべてフィクションです。</p>
    </div>

    <a href="main.html">ENTER</a>

    <div class="admin-name">
        Guide : 月樹
    </div>

    <footer>
        &copy; 2026 AM 4:00の境界線. Since 2026.04.04
    </footer>

</body>
</html>
